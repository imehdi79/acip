# VPS deployment: Traefik (TLS via Let's Encrypt) → editor-server → Postgres.
# Copy .env.example to .env next to this file, fill it in, then:
#   docker compose up -d --build
name: acip

services:
  traefik:
    image: traefik:v3.5
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  api:
    build:
      context: .
      dockerfile: apps/editor-server/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://acip:${POSTGRES_PASSWORD}@db:5432/acip?schema=public
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      # empty = allow all origins (current decision; tighten later)
      CORS_ORIGIN: ${CORS_ORIGIN:-}
    depends_on:
      db:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.acip-api.rule=Host(`${API_DOMAIN}`)
      - traefik.http.routers.acip-api.entrypoints=websecure
      - traefik.http.routers.acip-api.tls.certresolver=le
      - traefik.http.services.acip-api.loadbalancer.server.port=3000

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: acip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: acip
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acip -d acip"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  letsencrypt:
  pgdata:
